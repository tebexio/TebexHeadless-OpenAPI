          url:
            type: string
            example: "https://ident.tebex.io/"
    BasketResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Basket'
    Basket:
      type: object
      properties:
        id:
          type: string
          example: 244127617
        ident:
          type: string
          example: 1a-55fff4107740a1f40d844ff89607557f45bfafb3
        complete:
          type: boolean
          example: false
        email:
          type: string
          example: support@tebex.io
          nullable: true
        username:
          type: string
          example: null
          nullable: true
        coupons:
          type: array
          items:
            $ref: '#/components/schemas/Coupon'
        giftcards:
          type: array
          items:
            $ref: '#/components/schemas/GiftCard'
        creator_code:
          type: string
          description: The creator code is used to share a percentage of the payment with another party. See more about creator codes at https://docs.tebex.io/creators/tebex-control-panel/engagement/creator-codes
        cancel_url:
          type: string
          example: https://tebex.io
        complete_url:
          type: string
          nullable: true
          example: null
        complete_auto_redirect:
          type: boolean
          example: false
        country:
          type: string
          example: US
          description: A two-character country code
        ip:
          type: string
          example: 127.0.0.1
        username_id:
          type: integer
          example: 127244
        base_price:
          type: number
          format: float
          example: 1.27
        sales_tax:
          type: number
          format: float
          example: 0.11
        total_price:
          type: number
          format: float
          example: 1.38
        currency:
          type: string
          description: A 3 character currency code
          example: USD
        packages:
          type: array
          items:
            $ref: '#/components/schemas/BasketPackage'
        custom: 
          type: object
          nullable: true
          example: 
            foo: bar
            ref: 1234
        links:
          $ref: "#/components/schemas/BasketLinks"
    BasketLinks:
      type: object
      properties:
        payment:
          type: string
          description: The `links.payment` property is only returned if the basket has been paid for and a payment exists with the `complete`,`refund`, or `chargeback` status.
          example: https://checkout.tebex.io/api/payments/tbx-12345
        checkout:
          type: string
          description: The `links.checkout` property is only returned if the basket has not been paid, and is the URL to send the customer to make payment
          example: https://checkout.tebex.io/checkout/1a-55fff4107740a1f40d844ff89607557f45bfafb3
    CategoryResponse:
      type: object
      properties:
        data:
          type: array
          items: 
            $ref: "#/components/schemas/Category"
    Category:
      type: object
      properties:
        id:
          type: integer
          example: 2678660
        name:
          type: string
          example: "Test"
          description: User-friendly name of the category
        slug:
          type: string
          description: Short identifier slug for the category
          nullable: true
        parent: 
          type: object
          description: Parent category, if applicable
          format: Category
          nullable: true
        tiered:
          type: boolean
          description: True if this is a tiered category
          example: false
        active_tier:
          description: If this is a tiered category and the usernameId is provided, this will be the active tier information for this category.
          nullable: true
          $ref: "#/components/schemas/Tier"
        description:
          type: string
          description: HTML description of the category
        packages:
          type: array
          description: Packages within the category. For dynamic categories, packages use the `DynamicPackage` shape and are only populated when a `basketIdent` is provided.
          items:
            $ref: "#/components/schemas/Package"
#            anyOf:
#              - $ref: "#/components/schemas/Package"
##              - $ref: "#/components/schemas/DynamicPackage"
          nullable: true
        order:
          type: integer
          example: 1
          description: The numeric order in which to display the category.
        display_type:
          type: string
          enum: [list, grid]
          description: How the category should be displayed
        image_url:
          type: string
          format: uri
          nullable: true
          description: URL of the category image, if set.
          example: null
        dynamic:
          type: boolean
          description: True if this is a dynamic category. Dynamic categories are populated with custom packages per-basket using the Add Dynamic Packages endpoint, and their packages can only be fetched by providing a `basketIdent`.
          example: false
    PackageResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Package'
    Package:
      type: object
      properties:
        id:
          type: integer
          example: 6276316
        name:
          type: string
          example: 'test package 101'
        description:
          type: string
          example: '<p>this is just a test. only a test. nothing more.</p>'
        image:
          type: string
          nullable: true
          example: null
        type:
          type: string
          example: 'single'
        category:
          type: object
          properties:
            id:
              type: integer
              example: 2678660
            name:
              type: string
              example: 'Packages'
        base_price:
          type: number
          format: float
          example: 5
        sales_tax:
          type: number
          format: float
          example: 0
        total_price:
          type: number
          format: float
          example: 5
        currency:
          type: string
          example: 'USD'
        prorate_price:
          type: number
          format: float
          description: If this package is part of a tiered category, this is the difference on upgrade pricing from the current active tier.
          nullable: true
        discount:
          type: number
          format: float
          example: 0
        disable_quantity:
          type: boolean
          example: false
        disable_gifting:
          type: boolean
          example: false
        expiration_date:
          type: string
          nullable: true
          format: date-time
          example: null
        media:
          type: array
          items:
            $ref: '#/components/schemas/PackageMedia'
        order:
          type: integer
        slug:
          type: string
        user_limit:
          type: integer
        creator_meta_data:
          type: object
        options:
          type: array
        variables:
          type: array
        created_at:
          type: string
          format: date-time
          example: '2024-05-21T18:09:17+00:00'
        updated_at:
          type: string
          format: date-time
          example: '2024-05-21T18:09:17+00:00'
    BasketPackage:
      type: object
      description: A package within an existing basket.
      properties:
        id:
          type: integer
          description: The package ID
        description:
          type: string
          example: "100 coins added to your character"
        image:
          type: string
          example: "https://tebex.io/path/to/image.png"
        name:
          type: string
          example: "100 Coins"
        slug:
          type: string
          example: "100-coins"
        in_basket:
          type: object
          properties:
            quantity:
              type: integer
              description: The quantity of `package` in this basket. This is not the total quantity of overall items in the basket.
              example: 2
            price:
              type: number
              format: float
            gift_username_id:
              type: string
              description: The username id of the user this package is gifted to
            gift_username:
              type: string
              description: The username of the user this package is gifted to.
        type:
          type: string
          enum: [single,subscription]
          example: single
          description: The type of payment, either `single` for one-time payments or `subscription`.
        revenue_share:
          type: array
          description: An array of payment destination objects describing how the purchase should be split between multiple wallets. **Only available with pre-agreement from Tebex.**
          items:
            $ref: '#/components/schemas/RevenueShare'
    RevenueShare:
      type: object
      properties:
        wallet_ref:
          type: string
          example: some_wallet_reference
        amount:
          type: number
          example: 0.50
          description: A float (decimal) value representing the amount of this payment in your account currency that is credited to the `wallet_ref`
        gateway_fee_percent:
          type: number
          example: 50.00
          description: A float (decimal) value representing the percentage of the gateway fee that should be dedicated from this wallet’s revenue share. This optional value can be anywhere between 0 - 100.
    Tier:
      type: object
      properties:
        id:
          type: integer
          example: 40796
        created_at:
          type: string
          format: date-time
          description: The date and time when the tier became active
          example: "2025-05-14T13:48:56.000000Z"
        username_id:
          type: string
          description: The user's username ID. For Steam, this is a numeric representation of their Steam64ID
        package:
          $ref: '#/components/schemas/Package'
        active:
          type: boolean
          description: True if the tier is currently active.
          example: true
        recurring_payment_reference:
          type: string
          description: The ID of the recurring payment this tier is attached to.
          example: tbx-r-757925142
        next_payment_date:
          type: string
          format: date-time
          description: The date and time of the next payment for this tier.
          example: "2025-06-14T13:48:56+00:00"
        status:
          type: object
          properties:
            id:
              type: integer
              example: 2
            description:
              type: string
              example: Active
        pending_downgrade_package:
          type: object
          properties:
            id:
              type: integer
              example: 6834820
            name:
              type: string
              example: Bronze
          description: The package this tier is downgrading to if a downgrade is pending.
          nullable: true
    
    PackageMedia:
      properties:
        type:
          type: string
          enum: [video, image]
          example: image
        name:
          type: string
          description: A file name for the media, if applicable.
          example: e875d1010b2edb7f8c376728ab9dedfffe5bd012.jpg
          nullable: true
        url:
          type: string
          description: The URL of the package media.
          example: https://dunb17ur4ymx4.cloudfront.net/packages/images/e875d1010b2edb7f8c376728ab9dedfffe5bd012.jpg
        featured:
          type: boolean
          description: True if this media should be featured more prominently than others.
          example: false
        primary:
          type: boolean
          description: True if this is the primary media for the package.
          example: true

    DynamicPackagesRequest:
      type: object
      required: [username, category_id, packages]
      properties:
        username:
          type: string
          description: The username of the authenticated customer the packages are being created for.
          example: TestUser
        category_id:
          type: integer
          description: The ID of the dynamic category to populate.
          example: 1234
        packages:
          type: array
          items:
            $ref: '#/components/schemas/DynamicPackageInput'

    DynamicPackageInput:
      type: object
      description: A custom package to add to a dynamic category.
      required: [name, price, slug]
      properties:
        name:
          type: string
          example: Package Name 1
        price:
          type: number
          format: float
          example: 10.00
        slug:
          type: string
          example: package-name-1
        description:
          type: string
          example: This is the description
        image_url:
          type: string
          example: image.url/imageurl
        custom:
          type: object
          description: Arbitrary custom key/value data to associate with the package.
          additionalProperties:
            type: string
          example:
            custom-field-1: custom-value-1
            custom-field-2: custom-value-2
            custom-field-3: custom-value-3
    DynamicPackagesResponse:
      type: object
      properties:
        message:
          type: string
          example: Dynamic packages created successfully.

    ModulesResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Module'

    # Discriminated union over concrete module types
    Module:
      oneOf:
        - $ref: '#/components/schemas/TopCustomerModule'
        - $ref: '#/components/schemas/TextboxModule'
        - $ref: '#/components/schemas/RecentPaymentsModule'
        - $ref: '#/components/schemas/FeaturedPackageModule'
        - $ref: '#/components/schemas/GiftcardBalanceModule'
        - $ref: '#/components/schemas/ServerStatusModule'
        - $ref: '#/components/schemas/PaymentGoalModule'
        - $ref: '#/components/schemas/CommunityGoalModule'
      discriminator:
        propertyName: type
        mapping:
          top_customer: '#/components/schemas/TopCustomerModule'
          textbox: '#/components/schemas/TextboxModule'
          recent_payments: '#/components/schemas/RecentPaymentsModule'
          featured_package: '#/components/schemas/FeaturedPackageModule'
          giftcard_balance: '#/components/schemas/GiftcardBalanceModule'
          server_status: '#/components/schemas/ServerStatusModule'
          payment_goal: '#/components/schemas/PaymentGoalModule'
          community_goal: '#/components/schemas/CommunityGoalModule'

    TopCustomerModule:
      allOf:
        - $ref: '#/components/schemas/ModuleBase'
        - type: object
          properties:
            type:
              const: top_customer
            data:
              $ref: '#/components/schemas/TopCustomerData'
          required: [data]

    TopCustomerData:
      type: object
      required: [header, username, username_id]
      properties:
        header:
          type: string
          example: Top Customer
        username:
          type: string
          example: Test
        username_id:
          type: string
          description: User identifier.
          example: d8d5a9237b2043d8883b1150148d6955
        total:
          type: number
          description: Optional, present depending on module configuration.

    TextboxModule:
      allOf:
        - $ref: '#/components/schemas/ModuleBase'
        - type: object
          properties:
            type:
              const: textbox
            data:
              $ref: '#/components/schemas/TextboxData'
          required: [data]

    TextboxData:
      type: object
      required: [header, text]
      properties:
        header:
          type: string
          example: Modules
        text:
          type: string
          description: HTML supported.
          example: >-
            You can configure the sidebar of your webstore by going to <strong>Webstore</strong> &gt;
            <strong>Design</strong> &gt; <strong>Modules</strong>.

    ModuleBase:
      type: object
      required: [id, type, start_time, data]
      properties:
        id:
          type: integer
          format: int64
        type:
          type: string
          description: Discriminator for module kind.
        start_time:
          type: string
          format: date-time
        end_time:
          type:
            - 'null'
            - string
          format: date-time
          description: Nullable; when null the module is ongoing.
        data:
          type: object
          description: Type-specific payload.

    RecentPaymentsModule:
      allOf:
        - $ref: '#/components/schemas/ModuleBase'
        - type: object
          properties:
            type:
              const: recent_payments
            data:
              $ref: '#/components/schemas/RecentPaymentsData'
          required: [data]

    RecentPaymentsData:
      type: object
      required: [header, payments]
      properties:
        header:
          type: string
          example: Recent Payments
        payments:
          type: array
          items:
            $ref: '#/components/schemas/RecentPayment'

    RecentPayment:
      type: object
      required: [username, username_id, package]
      properties:
        username:
          type: string
          example: Test
        username_id:
          type: string
          example: d8d5a9237b2043d8883b1150148d6955
        package:
          type: object
          required: [name]
          properties:
            name:
              type: string
              example: Example Package
        created_at:
          type:
            - 'null'
            - string
          format: date-time
          description: Optional, present depending on module configuration.
        price:
          type:
            - 'null'
            - number
          description: Optional, present depending on module configuration.
        currency:
          type:
            - 'null'
            - string
          description: Optional, present depending on module configuration.
          example: USD

    FeaturedPackageModule:
      allOf:
        - $ref: '#/components/schemas/ModuleBase'
        - type: object
          properties:
            type:
              const: featured_package
            data:
              $ref: '#/components/schemas/FeaturedPackageData'
          required: [data]

    FeaturedPackageData:
      type: object
      required: [header, package]
      properties:
        header:
          type: string
          example: Featured Package
        package:
          $ref: '#/components/schemas/Package'

    GiftcardBalanceModule:
      allOf:
        - $ref: '#/components/schemas/ModuleBase'
        - type: object
          properties:
            type:
              const: giftcard_balance
            data:
              $ref: '#/components/schemas/GiftcardBalanceData'
          required: [data]

    GiftcardBalanceData:
      type: object
      required: [header]
      properties:
        header:
          type: string
          example: Giftcard Balance

    ServerStatusModule:
      allOf:
        - $ref: '#/components/schemas/ModuleBase'
        - type: object
          properties:
            type:
              const: server_status
            data:
              $ref: '#/components/schemas/ServerStatusData'
          required: [data]

    ServerStatusData:
      type: object
      required: [header, hostname, port, online, players]
      properties:
        header:
          type: string
          example: Server Status
        hostname:
          type: string
          example: play.hypixel.net
        port:
          type: integer
          example: 25565
        online:
          type: boolean
        players:
          description: Nullable object; null when server is offline.
          oneOf:
            - type: 'null'
            - $ref: '#/components/schemas/Players'

    Players:
      type: object
      required: [online, max]
      properties:
        online:
          type: integer
          example: 23735
        max:
          type: integer
          example: 200000

    PaymentGoalModule:
      allOf:
        - $ref: '#/components/schemas/ModuleBase'
        - type: object
          properties:
            type:
              const: payment_goal
            data:
              $ref: '#/components/schemas/PaymentGoalData'
          required: [data]

    PaymentGoalData:
      type: object
      required: [header, percentage, bar_style, bar_animated]
      properties:
        header:
          type: string
          example: Payment Goal
        percentage:
          type: number
          minimum: 0
          maximum: 100
          example: 0
        bar_style:
          type: string
          enum: [normal, striped]
          example: striped
        bar_animated:
          type: boolean
          example: true
        total:
          type:
            - 'null'
            - number
          description: Optional, present depending on module configuration.
        target:
          type:
            - 'null'
            - number
          description: Optional, present depending on module configuration.

    CommunityGoalModule:
      allOf:
        - $ref: '#/components/schemas/ModuleBase'
        - type: object
          properties:
            type:
              const: community_goal
            data:
              $ref: '#/components/schemas/CommunityGoalData'
          required: [data]

    CommunityGoalData:
      type: object
      required: [header, bar_style, bar_animated, percentage]
      properties:
        header:
          type: string
          example: Community Goal
        bar_style:
          type: string
          enum: [normal, striped]
          example: normal
        bar_animated:
          type: boolean
          example: true
        percentage:
          type: number
          minimum: 0
          maximum: 100
          example: 100
        total_payments:
          type:
            - 'null'
            - number
          description: Optional, present depending on module configuration.
        target:
          type:
            - 'null'
            - number
          description: Optional, present depending on module configuration.
        times_achieved:
          type:
            - 'null'
            - integer
          description: Optional, present depending on module configuration.
